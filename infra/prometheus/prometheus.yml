global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "docker-host-aideas"

rule_files:
  - "alert.rules"

scrape_configs:
  - job_name: "nodeexporter"
    scrape_interval: 5s
    static_configs:
      - targets: ["nodeexporter:9100"]

  - job_name: "cadvisor"
    scrape_interval: 5s
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "prometheus"
    scrape_interval: 10s
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "pushgateway"
    scrape_interval: 10s
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]

  - job_name: "opcua_exporter"
    scrape_interval: 5s
    static_configs:
      - targets: ["opcua-exporter:9687"]

  - job_name: "analytics"
    scrape_interval: 5s
    static_configs:
      - targets: ["analytics:9700"]
